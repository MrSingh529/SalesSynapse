    <!-- iOS App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" crossorigin="use-credentials">
    
    <title>SalesSynapse Pro - AI Sales Intelligence</title>
    
    <!-- iOS Dynamic App Color -->
    <meta name="theme-color" content="#007AFF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0A84FF" media="(prefers-color-scheme: dark)">
    
    <!-- iOS Status Bar Style -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- iOS Launch Screen Style -->
    <style>
      /* iOS Status Bar Background */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      
      /* iOS-style tap highlight */
      * {
        -webkit-tap-highlight-color: rgba(0, 122, 255, 0.3);
      }
      
      /* iOS-style momentum scrolling */
      .scrollable {
        -webkit-overflow-scrolling: touch;
      }
      
      /* Prevent text size adjustment on orientation change */
      html {
        -webkit-text-size-adjust: 100%;
      }
    </style>
    
    <script>
      // iOS-specific initialization
      if (navigator.standalone) {
        // Running in standalone mode (PWA)
        document.documentElement.classList.add('ios-standalone');
      }
      
      // Detect iOS device
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS) {
        document.documentElement.classList.add('ios-device');
      }
      
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').then(
            function(registration) {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            },
            function(err) {
              console.log('ServiceWorker registration failed: ', err);
            }
          );
        });
      }
      
      // iOS-style haptic feedback simulation
      if (!window.HapticFeedback) {
        window.HapticFeedback = {
          light: function() {
            if (window.navigator.vibrate) {
              window.navigator.vibrate(10);
            }
          },
          medium: function() {
            if (window.navigator.vibrate) {
              window.navigator.vibrate(20);
            }
          },
          heavy: function() {
            if (window.navigator.vibrate) {
              window.navigator.vibrate(30);
            }
          }
        };
      }
    </script>
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>SalesSynapse Pro requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
        <p>For the best experience, we recommend using Safari on iOS or macOS.</p>
      </div>
    </noscript>
    <div id="root"></div>
    
    <!-- iOS-specific scripts -->
    <script>
      // iOS viewport height fix
      function setViewportHeight() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      
      window.addEventListener('resize', setViewportHeight);
      window.addEventListener('orientationchange', setViewportHeight);
      setViewportHeight();
      
      // iOS back gesture detection
      let startX = 0;
      let startY = 0;
      
      document.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
      }, { passive: true });
      
      document.addEventListener('touchmove', function(e) {
        if (!startX || !startY) return;
        
        const diffX = e.touches[0].clientX - startX;
        const diffY = e.touches[0].clientY - startY;
        
        // Detect edge swipe (iOS back gesture)
        if (Math.abs(diffY) < 10 && diffX > 50 && startX < 20) {
          console.log('iOS back gesture detected');
        }
      }, { passive: true });
      
      // Prevent zoom on double tap (iOS)
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(event) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
    </script>
  </body>
</html>
